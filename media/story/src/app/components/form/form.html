
<div class="modal-header">
  <h4 class="modal-title">
    {{ formData.id ? 'Update Story' : 'Add Story' }}
  </h4>
  <button type="button" class="btn-close" (click)="closeForm()"></button>
</div>

<div class="modal-body">
  <form (ngSubmit)="submitForm()">

    <input type="text" [(ngModel)]="formData.title" name="title" placeholder="Title" class="form-control mb-2"/>

    <input type="text" [(ngModel)]="formData.url" name="url" placeholder="URL" class="form-control mb-2"/>

    <select [(ngModel)]="formData.source" name="source" class="form-control mb-2">
      <option [ngValue]="null" disabled>Select a source</option>
      @for (source of sources; track source.id) {
        <option [ngValue]="source.id">{{ source.name }}</option>
      }
    </select>



    <input type="text" [(ngModel)]="formData.body_text" name="body_text" placeholder="Body Text" class="form-control mb-2"/>

  
    <input
      type="text"
      name="companySearch"
      [(ngModel)]="companyQuery"
      [typeahead]="companies"
      typeaheadOptionField="name"
      (typeaheadOnSelect)="onCompanySelected($event.item)"
      placeholder="Search company..."
      class="form-control mb-2"
    />
    
    <div class="mb-2">
      @for (c of selectedCompanies; track c.id) {
        <span class="badge bg-primary me-1">
          {{ c.name }}
          <button type="button" (click)="removeCompany(c.id)">x</button>
        </span>
      }
    </div>

    <div class="modal-footer">
      <button type="submit" class="btn btn-success">
        {{ formData.id ? 'Update' : 'Save' }}
      </button>

      <button type="button" class="btn btn-danger" (click)="closeForm()">
        Cancel
      </button>
    </div>

  </form>
</div>
