<!DOCTYPE html>

<html>
<head>
    <title>All Sources</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body class="bg-light">

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>All Sources</h2>

    <a href="{% url 'source:add' %}" class="btn btn-primary">
        + Add Source
    </a>
  
    

</div>




{% for source in sources %}

<div class="card mb-3 shadow-sm border-0">
    <div class="card-body">

        <div class="row align-items-center text-center">

           
            <div class="col-md-1">
                <strong>{{ source.id }}</strong>
            </div>

         
            <div class="col-md-2 text-primary">
                {{ source.name }}
            </div>

            <div class="col-md-2">
                <a href="{{ source.url }}" target="_blank" class="text-decoration-none">
                    Visit_to_url
                </a>
            </div>

       
            <div class="col-md-2">
                {% for company in source.tagged_companies.all %}
                    <span class="badge bg-secondary me-1">
                        {{ company.name }}
                    </span>
                {% endfor %}
            </div>

          
            <div class="col-md-2">
                <a href="{% url 'source:detail' source.id %}" class="btn btn-primary btn-sm">
                    View Stories
                </a>
            </div>

        
            <div class="col-md-1">
                <a href="{% url 'source:update' source.id %}" class="btn btn-warning btn-sm">
                    Update
                </a>
            </div>


           

                <!-- <div class="col-md-1">
                    <a href="#" class="btn btn-danger btn-sm">
                        Delete
                    </a> -->

        </div>

    </div>
</div>

{% empty %}

<div class="alert alert-info">
    No sources available
</div>

{% endfor %}


</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
