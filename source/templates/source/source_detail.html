<!DOCTYPE html>

<html>
<head>
    <title>All Stories</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


</head>
<body class="bg-light">

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>All Stories</h2>

    <!-- <a href="{% url 'story:create' %}" class="btn btn-primary">
        + Add Story
    </a> -->

      <a href="{% url 'source:list' %}" class="btn btn-primary">
        Back
    </a>
</div>



{% for story in stories %}

<div class="card mb-3 shadow-sm border-0">
    <div class="card-body">

    <div class="row align-items-center text-center">

        <!-- ID -->
        
        <div class="col-md-1">
            
            <strong>{{ story.id }}</strong>
        </div>

        <!-- Title -->
        <div class="col-md-3 text-primary">
            {{ story.title }}
        </div>

        <!-- Source -->
        <div class="col-md-2 text-success">
            {{ story.source.name }}
        </div>

        <!-- URL -->
        <div class="col-md-3">
            <a href="{{ story.url }}" target="_blank" class="text-decoration-none">
                Visit_to_url
            </a>
        </div>

        <!-- Companies -->
        <div class="col-md-2">
            {% for company in story.tagged_companies.all %}
                <span class="badge bg-secondary me-1">
                    {{ company.name }}
                </span>
            {% endfor %}
        </div>

        <!-- Action -->
        <div class="col-md-1">
            <a href="{% url 'story:story_detail' story.id %}" class="btn btn-sm btn-outline-info">
                View
            </a>
             <a href="{% url 'story:update' story.id %}" class="btn btn-sm btn-outline-info">
                Update
            </a>
             <a href="{% url 'story:delete' story.id %}" class="btn btn-sm btn-outline-info">
                Delete
            </a>
        </div>


    </div>

</div>


</div>

{% empty %}

<div class="alert alert-info">
    No stories available
</div>

{% endfor %}


</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
