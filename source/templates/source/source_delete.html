{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="col-md-6 offset-md-3">

        <div class="card p-4 shadow">
            <h3 class="text-center">Delete Sources</h3>

            <form method="post" action="{% url 'source:delete' source.id %}">
    {% csrf_token %}
    <p>Are you sure you want to delete "{{ source.name }}"?</p>
    <button type="submit">Delete</button>
    <a href="{% url 'source:list' %}">Cancel</a>
</form>

        </div>

    </div>
</div>

{% endblock %}
